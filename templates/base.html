<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}College Prep Tracker{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f4f7fb;
      --bg-accent: #eef4ff;
      --surface: rgba(255,255,255,0.88);
      --surface-strong: #ffffff;
      --surface-soft: #f8fbff;
      --border: rgba(15, 23, 42, 0.08);
      --border-strong: rgba(37, 99, 235, 0.14);
      --text: #0f172a;
      --text-soft: #334155;
      --muted: #64748b;
      --blue: #1652f0;
      --blue-dark: #0f3ec9;
      --blue-soft: rgba(22, 82, 240, 0.08);
      --purple-soft: rgba(99, 102, 241, 0.10);
      --amber-soft: rgba(245, 158, 11, 0.14);
      --green-soft: rgba(16, 185, 129, 0.14);
      --red-soft: rgba(239, 68, 68, 0.14);
      --green: #059669;
      --amber: #d97706;
      --red: #dc2626;
      --shadow: 0 20px 55px rgba(15, 23, 42, 0.08);
      --shadow-soft: 0 10px 30px rgba(15, 23, 42, 0.05);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 16px;
      --radius-sm: 12px;
    }
    body {
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(59, 130, 246, 0.10), transparent 26%),
        radial-gradient(circle at top right, rgba(99, 102, 241, 0.08), transparent 24%),
        linear-gradient(180deg, #f8fbff 0%, var(--bg) 40%, #eef3f9 100%);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
      padding-bottom: 108px;
    }
    a { color: inherit; }
    .container { max-width: 1160px; margin: 0 auto; padding: 28px 18px 0; }
    .page-header {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: flex-start;
      gap: 20px;
      margin-bottom: 24px;
    }
    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px;
      border: 1px solid var(--border-strong);
      border-radius: 999px;
      background: rgba(255,255,255,0.7);
      color: var(--blue);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }
    .hero-title, .section-title {
      font-size: clamp(30px, 4vw, 52px);
      font-weight: 800;
      line-height: 1.05;
      letter-spacing: -0.04em;
    }
    .section-title {
      font-size: clamp(24px, 3vw, 34px);
      margin-bottom: 8px;
    }
    .section-sub, .hero-subtitle {
      font-size: 15px;
      color: var(--muted);
      max-width: 700px;
    }
    .hero-card {
      position: relative;
      overflow: hidden;
      background: linear-gradient(145deg, rgba(255,255,255,0.94), rgba(244,248,255,0.92));
      border: 1px solid rgba(255,255,255,0.65);
      box-shadow: var(--shadow);
      border-radius: var(--radius-xl);
      padding: 30px;
      margin-bottom: 20px;
    }
    .hero-card::after {
      content: "";
      position: absolute;
      inset: auto -10% -35% auto;
      width: 260px;
      height: 260px;
      background: radial-gradient(circle, rgba(22,82,240,0.14), transparent 62%);
      pointer-events: none;
    }
    .card {
      background: var(--surface);
      backdrop-filter: blur(18px);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 22px;
      margin-bottom: 16px;
      box-shadow: var(--shadow-soft);
    }
    .card h3 { font-size: 16px; font-weight: 700; margin-bottom: 8px; }
    .card-link { text-decoration: none; display: block; }
    .card-link .card { transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease; }
    .card-link:hover .card { transform: translateY(-2px); box-shadow: var(--shadow); border-color: var(--border-strong); }
    .grid-2, .grid-3 {
      display: grid;
      gap: 16px;
    }
    .grid-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .grid-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .split-hero {
      display: grid;
      grid-template-columns: minmax(0, 1.4fr) minmax(280px, 0.9fr);
      gap: 22px;
      align-items: stretch;
    }
    .stat-strip {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      margin-top: 22px;
    }
    .mini-stat {
      padding: 16px;
      border-radius: 18px;
      background: rgba(255,255,255,0.72);
      border: 1px solid rgba(15, 23, 42, 0.06);
    }
    .mini-stat .label {
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 6px;
    }
    .mini-stat .value {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.03em;
    }
    .surface-note {
      background: var(--surface-soft);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 16px 18px;
    }
    .surface-note strong { display: block; margin-bottom: 4px; }
    .bar-bg {
      width: 100%;
      background: rgba(148, 163, 184, 0.16);
      border-radius: 999px;
      height: 10px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      border-radius: 999px;
      transition: width 0.5s ease;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 18px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.92);
      font-size: 13px;
      cursor: pointer;
      font-weight: 700;
      color: var(--text);
      transition: all 0.15s ease;
      text-decoration: none;
    }
    .btn:hover { border-color: rgba(22, 82, 240, 0.26); color: var(--blue); transform: translateY(-1px); }
    .btn-primary {
      background: linear-gradient(180deg, #2f6bff, var(--blue));
      color: #fff;
      border-color: transparent;
      box-shadow: 0 14px 30px rgba(22, 82, 240, 0.25);
    }
    .btn-primary:hover { color: #fff; background: linear-gradient(180deg, #2563eb, var(--blue-dark)); }
    .btn-sm { padding: 8px 12px; font-size: 12px; }
    .btn-done { background: #ecfdf5; color: #047857; border-color: rgba(16,185,129,0.18); }
    .btn-skip { background: #fffbeb; color: #b45309; border-color: rgba(245,158,11,0.22); }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
    }
    .pillars-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 16px; }
    .pillar-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
    }
    input[type="number"], input[type="text"], textarea, select {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid rgba(148, 163, 184, 0.28);
      border-radius: 14px;
      font-size: 14px;
      font-family: inherit;
      background: rgba(255,255,255,0.94);
      color: var(--text);
    }
    textarea { resize: vertical; min-height: 84px; }
    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: rgba(22, 82, 240, 0.45);
      box-shadow: 0 0 0 4px rgba(22,82,240,0.10);
    }
    .metric-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 132px 120px auto;
      align-items: center;
      gap: 14px;
      padding: 16px 0;
      border-bottom: 1px solid rgba(148, 163, 184, 0.16);
    }
    .metric-row:last-child { border-bottom: none; }
    .metric-label { font-size: 14px; font-weight: 600; color: var(--text-soft); }
    .metric-val { font-size: 16px; font-weight: 800; text-align: right; letter-spacing: -0.02em; }
    .metric-bar { width: 100%; }
    .task-item {
      padding: 16px;
      border: 1px solid rgba(148, 163, 184, 0.18);
      border-radius: 18px;
      margin-bottom: 10px;
      background: rgba(255,255,255,0.76);
    }
    .task-label { font-size: 14px; font-weight: 600; margin-bottom: 10px; color: var(--text-soft); }
    .task-actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .nudge {
      padding: 16px 18px;
      border-radius: 18px;
      margin-bottom: 10px;
      font-size: 14px;
      line-height: 1.6;
      display: flex;
      gap: 10px;
      align-items: flex-start;
      border: 1px solid transparent;
    }
    .nudge .icon { font-size: 17px; flex-shrink: 0; margin-top: 1px; }
    .toast {
      position: fixed;
      top: 20px;
      right: 20px;
      background: #0f172a;
      color: #fff;
      padding: 14px 20px;
      border-radius: 16px;
      font-size: 14px;
      z-index: 999;
      box-shadow: var(--shadow);
      animation: slideIn 0.3s;
    }
    @keyframes slideIn { from { transform: translateX(100px); opacity: 0; } to { transform: none; opacity: 1; } }
    .momentum-ring {
      width: 144px;
      height: 144px;
      position: relative;
      margin: 0 auto;
      border-radius: 50%;
      background: radial-gradient(circle at center, rgba(255,255,255,0.95) 58%, rgba(22,82,240,0.04) 100%);
      box-shadow: inset 0 0 0 1px rgba(148,163,184,0.12);
    }
    .momentum-ring svg { transform: rotate(-90deg); }
    .momentum-num {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 38px;
      font-weight: 800;
      letter-spacing: -0.04em;
    }
    .momentum-num span {
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .essay-card {
      border: 1px solid rgba(99, 102, 241, 0.12);
      padding: 16px 18px;
      background: #f8faff;
      border-radius: 18px;
      margin-bottom: 10px;
    }
    .share-page {
      background: #fff;
      padding: 32px;
      border-radius: 28px;
      border: 1px solid rgba(15,23,42,0.08);
      box-shadow: var(--shadow);
    }
    .table-clean {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .table-clean th,
    .table-clean td {
      padding: 10px 12px;
      border-bottom: 1px solid rgba(148, 163, 184, 0.18);
    }
    .table-clean th {
      color: var(--muted);
      font-weight: 700;
      text-align: left;
    }
    .table-clean td:last-child,
    .table-clean th:last-child { text-align: right; }
    .top-nav {
      position: sticky;
      top: 14px;
      z-index: 90;
      margin-bottom: 22px;
    }
    .top-nav-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 16px;
      border-radius: 22px;
      background: rgba(255,255,255,0.72);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,0.7);
      box-shadow: var(--shadow-soft);
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
    }
    .brand-mark {
      width: 40px;
      height: 40px;
      border-radius: 14px;
      background: linear-gradient(180deg, #2f6bff, var(--blue));
      color: #fff;
      display: grid;
      place-items: center;
      font-size: 18px;
      box-shadow: 0 14px 30px rgba(22, 82, 240, 0.24);
    }
    .brand-copy strong { display: block; font-size: 14px; letter-spacing: -0.02em; }
    .brand-copy span { display: block; font-size: 12px; color: var(--muted); }
    .nav {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.9);
      border: 1px solid rgba(15,23,42,0.08);
      backdrop-filter: blur(18px);
      box-shadow: var(--shadow);
      display: flex;
      justify-content: center;
      gap: 6px;
      padding: 8px;
      border-radius: 24px;
      z-index: 100;
      width: min(calc(100% - 24px), 680px);
    }
    .nav a {
      display: flex;
      flex: 1;
      flex-direction: column;
      align-items: center;
      padding: 10px 12px;
      border-radius: 18px;
      text-decoration: none;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      transition: all 0.15s ease;
    }
    .nav a.active { color: var(--blue); background: var(--blue-soft); }
    .nav a span.icon { font-size: 18px; margin-bottom: 4px; }
    .collapsible-header { cursor: pointer; display: flex; justify-content: space-between; align-items: center; gap: 12px; }
    .collapsible-header:hover { opacity: 0.88; }
    .fade-in { animation: fadeIn 0.3s; }
    .page-block { margin-bottom: 22px; }
    .stack-sm > * + * { margin-top: 10px; }
    .muted { color: var(--muted); }
    .right { text-align: right; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
    @media print {
      .nav, .btn, .no-print, .top-nav { display: none !important; }
      body { padding: 0; background: #fff; }
      .container { max-width: none; padding: 0; }
      .share-page { box-shadow: none; border: none; padding: 0; }
    }
    @media (max-width: 900px) {
      .split-hero,
      .grid-2,
      .grid-3,
      .pillars-grid,
      .stat-strip { grid-template-columns: 1fr; }
      .metric-row { grid-template-columns: 1fr; }
      .metric-val { text-align: left; }
      .top-nav-inner { padding: 12px 14px; }
    }
    @media (max-width: 640px) {
      body { padding-bottom: 102px; }
      .container { padding: 18px 14px 0; }
      .hero-card, .card, .share-page { padding: 20px; border-radius: 22px; }
      .nav a { padding: 8px 6px; font-size: 10px; }
      .nav a span.icon { font-size: 16px; }
      .page-header { margin-bottom: 18px; }
      .hero-title, .section-title { letter-spacing: -0.05em; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="top-nav no-print">
      <div class="top-nav-inner">
        <a href="/" class="brand">
          <span class="brand-mark">C</span>
          <span class="brand-copy">
            <strong>College Prep</strong>
            <span>Command Center</span>
          </span>
        </a>
        <div class="eyebrow">Fall 2027 roadmap</div>
      </div>
    </div>
    {% block content %}{% endblock %}
  </div>
  <nav class="nav no-print">
    <a href="/" class="{% if request.path == '/' %}active{% endif %}">
      <span class="icon">📊</span>Dashboard
    </a>
    <a href="/pillars" class="{% if '/pillars' in request.path %}active{% endif %}">
      <span class="icon">🎯</span>Pillars
    </a>
    <a href="/weekly" class="{% if '/weekly' in request.path %}active{% endif %}">
      <span class="icon">📝</span>Weekly
    </a>
    <a href="/essay" class="{% if '/essay' in request.path %}active{% endif %}">
      <span class="icon">✍️</span>Essay
    </a>
    <a href="/share" class="{% if '/share' in request.path %}active{% endif %}">
      <span class="icon">📤</span>Share
    </a>
  </nav>
  <div id="toast" class="toast" style="display:none"></div>
  <script>
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.style.display = 'block';
      setTimeout(() => t.style.display = 'none', 2500);
    }
    async function api(url, data) {
      const r = await fetch(url, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(data) });
      return r.json();
    }
    async function apiDel(url) {
      const r = await fetch(url, { method: 'DELETE' });
      return r.json();
    }
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
