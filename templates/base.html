<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}College Prep Tracker{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f8fafc; --card: #fff; --border: #e5e7eb; --text: #1a1a2e;
      --muted: #6B7280; --blue: #3B82F6; --purple: #8B5CF6; --pink: #EC4899;
      --amber: #F59E0B; --green: #10B981; --red: #EF4444;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; padding-bottom: 80px; }
    .container { max-width: 720px; margin: 0 auto; padding: 12px 16px; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 12px; }
    .card h3 { font-size: 16px; font-weight: 700; margin-bottom: 8px; }
    .bar-bg { width: 100%; background: #e5e7eb; border-radius: 4px; height: 8px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 4px; transition: width 0.5s; }
    .btn { padding: 8px 16px; border-radius: 8px; border: 1px solid var(--border); background: var(--card); font-size: 13px; cursor: pointer; font-weight: 500; transition: all 0.15s; }
    .btn:hover { border-color: var(--blue); color: var(--blue); }
    .btn-primary { background: var(--blue); color: #fff; border-color: var(--blue); }
    .btn-primary:hover { background: #2563EB; }
    .btn-sm { padding: 4px 10px; font-size: 12px; }
    .btn-done { background: #DEF7EC; color: #03543F; border-color: #A7F3D0; }
    .btn-skip { background: #FEF3C7; color: #92400E; border-color: #FDE68A; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    input[type="number"], input[type="text"], textarea, select {
      width: 100%; padding: 8px 12px; border: 1px solid var(--border); border-radius: 8px;
      font-size: 14px; font-family: inherit; background: var(--card);
    }
    textarea { resize: vertical; min-height: 60px; }
    input:focus, textarea:focus, select:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
    .nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card); border-top: 1px solid var(--border);
           display: flex; justify-content: center; gap: 4px; padding: 8px 12px; z-index: 100; }
    .nav a { display: flex; flex-direction: column; align-items: center; padding: 6px 14px; border-radius: 8px;
             text-decoration: none; color: var(--muted); font-size: 11px; font-weight: 500; transition: all 0.15s; }
    .nav a.active { color: var(--blue); background: rgba(59,130,246,0.08); }
    .nav a span.icon { font-size: 20px; margin-bottom: 2px; }
    .section-title { font-size: 20px; font-weight: 800; margin-bottom: 4px; }
    .section-sub { font-size: 13px; color: var(--muted); margin-bottom: 16px; }
    .pillar-tag { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 16px; font-size: 12px; font-weight: 600; }
    .nudge { padding: 10px 14px; border-radius: 8px; margin-bottom: 6px; font-size: 13px; line-height: 1.5; display: flex; gap: 8px; align-items: flex-start; }
    .nudge .icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
    .metric-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid #f3f4f6; }
    .metric-row:last-child { border-bottom: none; }
    .metric-label { flex: 1; font-size: 14px; font-weight: 500; }
    .metric-val { font-size: 14px; font-weight: 700; min-width: 80px; text-align: right; }
    .metric-bar { width: 100px; flex-shrink: 0; }
    .task-item { padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 6px; }
    .task-label { font-size: 14px; margin-bottom: 6px; }
    .task-actions { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
    .toast { position: fixed; top: 20px; right: 20px; background: #065F46; color: #fff; padding: 12px 20px;
             border-radius: 8px; font-size: 14px; z-index: 999; animation: slideIn 0.3s; }
    @keyframes slideIn { from { transform: translateX(100px); opacity: 0; } to { transform: none; opacity: 1; } }
    .momentum-ring { width: 120px; height: 120px; position: relative; margin: 0 auto; }
    .momentum-ring svg { transform: rotate(-90deg); }
    .momentum-num { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
                    font-size: 32px; font-weight: 800; }
    .header-bar { text-align: center; padding: 16px 0 8px; }
    .essay-card { border-left: 3px solid var(--purple); padding: 12px 14px; background: #faf5ff; border-radius: 0 8px 8px 0; margin-bottom: 8px; }
    .share-page { background: #fff; padding: 24px; }
    .share-page .metric-row { font-size: 13px; }
    @media print { .nav, .btn, .no-print { display: none !important; } body { padding: 0; background: #fff; } }
    .collapsible-header { cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
    .collapsible-header:hover { opacity: 0.8; }
    .fade-in { animation: fadeIn 0.3s; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  </style>
</head>
<body>
  <div class="container">
    {% block content %}{% endblock %}
  </div>
  <nav class="nav no-print">
    <a href="/" class="{% if request.path == '/' %}active{% endif %}">
      <span class="icon">📊</span>Dashboard
    </a>
    <a href="/pillars" class="{% if '/pillars' in request.path %}active{% endif %}">
      <span class="icon">🎯</span>Pillars
    </a>
    <a href="/weekly" class="{% if '/weekly' in request.path %}active{% endif %}">
      <span class="icon">📝</span>Weekly
    </a>
    <a href="/essay" class="{% if '/essay' in request.path %}active{% endif %}">
      <span class="icon">✍️</span>Essay
    </a>
    <a href="/share" class="{% if '/share' in request.path %}active{% endif %}">
      <span class="icon">📤</span>Share
    </a>
  </nav>
  <div id="toast" class="toast" style="display:none"></div>
  <script>
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.style.display = 'block';
      setTimeout(() => t.style.display = 'none', 2500);
    }
    async function api(url, data) {
      const r = await fetch(url, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(data) });
      return r.json();
    }
    async function apiDel(url) {
      const r = await fetch(url, { method: 'DELETE' });
      return r.json();
    }
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
